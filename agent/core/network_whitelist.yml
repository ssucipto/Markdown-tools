  - "*.googleapis.com"
  - "*.firebase.google.com"
  - "*.firebaseio.com"
  - "*.github.com"
  - "*.githubusercontent.com"
  - "registry.npmjs.org"
  - "registry.yarnpkg.com"

# CIDR notation for approved IP ranges (optional)
approved_ip_ranges: []

# Set to true ONLY with documented rationale in agent/memory/decisions.md
# When false, any dynamic hostname construction triggers IG-05 (HIGH finding).
dynamic_hosts_allowed: false

