# agent/manifest.template.yaml
# Template for ACP package manifest
# This file tracks installed ACP packages and their versions

# Installed packages
# Each package entry tracks source, version, and installed files
packages: {}

# ── Scaffold Configuration ─────────────────────────────────────
# Controls what gets generated during bootstrap.
# Solo = ~30 files, Small = ~80 files, Team = ~310 files.
scaffold:
  team_size: small            # solo | small | team
  generate_prompts: false     # .github/prompts/ wrappers (opt-in)
  generate_opencode: true     # .opencode/commands/ slash commands

# Manifest format version (for future compatibility)
manifest_version: 1.0.0

# Last time manifest was updated
last_updated: null
