name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4 (pinned to SHA for supply-chain integrity)
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4 (pinned to SHA for supply-chain integrity)
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npm audit --audit-level=high --omit=dev
        continue-on-error: false
      - run: npm test
      - run: npm run test:coverage
      - run: npm run build
      - run: npm run build:lib

  lib-pack:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4 (pinned to SHA for supply-chain integrity)
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4 (pinned to SHA for supply-chain integrity)
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run build:lib
      - run: npm pack --dry-run

  e2e:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4 (pinned to SHA for supply-chain integrity)
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4 (pinned to SHA for supply-chain integrity)
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e

  lighthouse:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4 (pinned to SHA for supply-chain integrity)
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4 (pinned to SHA for supply-chain integrity)
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run perf:check
